<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VR Data Visualisation</title>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.159.0/build/three.module.js"
      }
    }
  </script>
  <style>
    body {
      background: black;
      margin: 0;
      overflow: hidden;
    }

    #mic-btn {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 10;
      color: white;
      background: #333;
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <button id="mic-btn">Enable Mic</button>

  <script type="module">
    import { initScene, scene, camera, renderer, onXRSessionStart, shouldBootstrapData } from './src/scene.js';
    import { onMessage, sendQuery, sendLoadRun, onConnectionChange } from './src/ws.js';
    import { renderPanels } from './src/panels.js';
    import { renderScatter } from './src/scatter3d.js';
    import { initTrainingDisplay, showTrainingVerdict, clearTrainingDisplay } from './src/training_verdict.js';
    import { initVoice, speak, startListening, onMicStateChange } from './src/voice.js';
    import { renderKDESurface, renderCorrField } from './src/renderers.js';
    import { highlightTargets } from './src/highlight.js';
    import { initInteractions } from './src/interactions.js';
    import { renderReport } from './src/report.js';
    import { initVRUI } from './src/vr_ui.js';

    function handleVoiceQuery(transcript) {
      console.log('Voice query:', transcript);
      const needsTrainingRun = /\b(overfit|overfitting|training|train loss|val loss|validation loss|loss curve|my model)\b/i.test(transcript);
      if (needsTrainingRun) {
        clearTrainingDisplay();
        initTrainingDisplay();
        sendLoadRun('overfit');
      }
      sendQuery(transcript);
    }

    initScene();

    const vrUi = initVRUI(camera, renderer, {
      onMic: () => startListening(),
      onExit: () => {},
      onStatusChange: (setStatus) => onConnectionChange(setStatus),
    });

    initInteractions(scene, camera, renderer, (action) => vrUi.handleUIAction(action));
    initVoice(handleVoiceQuery);
    onMicStateChange((active) => vrUi.setMicListening(active));

    onXRSessionStart(() => {
      if (shouldBootstrapData()) {
        sendQuery('show EDA of all my columns');
      }
      vrUi.updateStatus('Look forward for charts · Mic below');
    });

    onMessage('panels', (msg) => renderPanels(msg));
    onMessage('highlight', (msg) => highlightTargets(msg.target_ids));
    onMessage('scatter3d', (msg) => renderScatter(msg));
    initTrainingDisplay();
    onMessage('training_update', (msg) => showTrainingVerdict(msg));
    onMessage('speech', (msg) => speak(msg.text));
    onMessage('report', (msg) => {
      renderReport(msg);
      const text = msg.narration ?? msg.summary ?? msg.text;
      if (text) speak(text);
    });
    onMessage('kde_surface', (msg) => renderKDESurface(msg));
    onMessage('corr_field', (msg) => renderCorrField(msg));
  </script>
</body>
</html>

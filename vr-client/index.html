<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VR Data Visualisation</title>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.159.0/build/three.module.js"
      }
    }
  </script>
  <style>
    body {
      background: black;
      margin: 0;
      overflow: hidden;
    }

    #mic-btn {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 10;
      color: white;
      background: #333;
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <button id="mic-btn">Enable Mic</button>

  <script type="module">
    import { initScene, scene, camera, renderer, onXRSessionStart, setFrameUpdateCallback } from './src/scene.js';
    import { onMessage, sendQuery, sendLoadRun, onConnectionChange, onConnect, isMockMode } from './src/ws.js';
    import { renderPanels } from './src/panels.js';
    import { renderScatter } from './src/scatter3d.js';
    import { showTrainingVerdict, clearTrainingDisplay } from './src/training_verdict.js';
    import { initRibbon, addTrainingStep, clearRibbon, readLosses } from './src/loss_ribbon.js';
    import { initVoice, speak, startListening, onMicStateChange } from './src/voice.js';
    import { renderKDESurface, renderCorrField } from './src/renderers.js';
    import { highlightTargets } from './src/highlight.js';
    import { initInteractions, updateXRInteractions, notifySceneObjectsChanged } from './src/interactions.js';
    import { renderReport } from './src/report.js';
    import { initVRUI } from './src/vr_ui.js';

    function handleVoiceQuery(transcript) {
      console.log('Voice query:', transcript);
      const needsTraining = /\b(overfit|overfitting|training|train loss|val loss|validation loss|loss curve|my model|train the model|train model)\b/i.test(transcript);
      if (needsTraining) {
        clearRibbon();
        clearTrainingDisplay();
        initRibbon();
        if (/\b(overfit|overfitting|my model)\b/i.test(transcript)) {
          sendLoadRun('overfit');
        }
      }
      sendQuery(transcript);
    }

    let autoChartsRequested = false;

    function loadCharts() {
      if (isMockMode()) return;
      sendQuery('show EDA of all my columns');
      vrUi.updateStatus('Loading charts…');
    }

    function bootstrapChartsOnce() {
      if (autoChartsRequested || isMockMode()) return;
      autoChartsRequested = true;
      loadCharts();
    }

    initScene();
    setFrameUpdateCallback(updateXRInteractions);

    const vrUi = initVRUI(camera, renderer, {
      onMic: () => startListening(),
      onLoadCharts: () => loadCharts(),
      onExit: () => {},
      onStatusChange: (setStatus) => onConnectionChange(setStatus),
    });

    initInteractions(scene, camera, renderer, (action) => vrUi.handleUIAction(action));
    initVoice(handleVoiceQuery);
    onMicStateChange((active) => vrUi.setMicListening(active));

    onConnect(() => bootstrapChartsOnce());

    onXRSessionStart(() => {
      bootstrapChartsOnce();
      vrUi.updateStatus('Look forward · Mic or Charts below');
    });

    onMessage('panels', (msg) => {
      renderPanels(msg);
      notifySceneObjectsChanged();
      vrUi.updateStatus(`${msg.panels?.length ?? 0} charts loaded`);
    });
    onMessage('highlight', (msg) => highlightTargets(msg.target_ids));
    onMessage('scatter3d', (msg) => {
      renderScatter(msg);
      notifySceneObjectsChanged();
    });
    initRibbon();

    function handleTrainingUpdate(msg) {
      if (readLosses(msg)) {
        addTrainingStep(msg);
      }
      if (msg?.metrics && 'verdict_code' in msg.metrics) {
        showTrainingVerdict(msg);
      }
    }

    onMessage('training_update', handleTrainingUpdate);
    onMessage('speech', (msg) => speak(msg.text));
    onMessage('report', (msg) => {
      renderReport(msg);
      const text = msg.narration ?? msg.summary ?? msg.text;
      if (text) speak(text);
    });
    onMessage('kde_surface', (msg) => renderKDESurface(msg));
    onMessage('corr_field', (msg) => renderCorrField(msg));
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VR Data Visualisation</title>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.159.0/build/three.module.js"
      }
    }
  </script>
  <style>
    body {
      background: black;
      margin: 0;
      overflow: hidden;
    }

    #mic-btn {
      position: absolute;
      top: 20px;
      left: 20px;
      color: white;
      background: #333;
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <button id="mic-btn">Enable Mic</button>

  <script type="module">
    import * as THREE from 'three';
    import { VRButton } from 'https://cdn.jsdelivr.net/npm/three@0.159.0/examples/jsm/webxr/VRButton.js';
    import { initScene } from './src/scene.js';
    import { onMessage } from './src/ws.js';
    import { sendQuery } from './src/ws.js';
    import { renderPanels, highlightPanel } from './src/panels.js';
    import { renderScatter, clearScatter, initInteractions } from './src/scatter3d.js';
    import { initRibbon, addTrainingStep, clearRibbon } from './src/loss_ribbon.js';
    import { initVoice, speak, stopSpeaking } from './src/voice.js';
    import { renderKDESurface, renderCorrField, clearRenderers } from './src/renderers.js';

    initScene();

    onMessage('panels', (msg) => renderPanels(msg));
    onMessage('highlight', (msg) => highlightPanel(msg.target_ids));
    onMessage('scatter3d', (msg) => renderScatter(msg));
    initRibbon();
    onMessage('training_update', (msg) => addTrainingStep(msg));
    initVoice((transcript) => {
      console.log('Voice query:', transcript);
      sendQuery(transcript);
    });
    onMessage('speech', (msg) => speak(msg.text));
    onMessage('report', (msg) => speak(msg.speak ? msg.verdict : ''));
    onMessage('kde_surface', (msg) => renderKDESurface(msg));
    onMessage('corr_field', (msg) => renderCorrField(msg));
  </script>
</body>
</html>
